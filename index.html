<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/images/logo.webp" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2D4A32" />

    <!-- Preload hero image — eliminates LCP delay on first load -->
    <link rel="preload" as="image" href="/images/products/serum.webp" fetchpriority="high" />

    <!-- Primary SEO -->
    <title>VerdeBliss — Certified Organic Skincare India</title>
    <meta name="description" content="Premium certified organic skincare from India. Vegan, cruelty-free botanicals for every skin type. Free shipping above ₹499. Shop serums, moisturisers, SPF & more." />
    <meta name="keywords" content="organic skincare India, natural skincare, vegan skincare, cruelty-free cosmetics, bakuchiol serum, niacinamide, certified organic beauty" />
    <meta name="author" content="VerdeBliss Cosmetics Private Limited" />
    <link rel="canonical" href="https://www.verdebliss.com/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://www.verdebliss.com/" />
    <meta property="og:title"       content="VerdeBliss — Certified Organic Skincare India" />
    <meta property="og:description" content="Premium certified organic skincare. Vegan, cruelty-free botanicals for every skin type. Free shipping above ₹499." />
    <meta property="og:image"       content="https://www.verdebliss.com/images/products/serum.webp" />
    <meta property="og:image:width" content="800" />
    <meta property="og:image:height" content="800" />
    <meta property="og:site_name"   content="VerdeBliss" />
    <meta property="og:locale"      content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@verdebliss" />
    <meta name="twitter:title"       content="VerdeBliss — Certified Organic Skincare India" />
    <meta name="twitter:description" content="Premium certified organic skincare. Vegan, cruelty-free botanicals. Free shipping above ₹499." />
    <meta name="twitter:image"       content="https://www.verdebliss.com/images/products/serum.webp" />

    <!-- JSON-LD: Organization schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "VerdeBliss",
      "legalName": "VerdeBliss Cosmetics Private Limited",
      "url": "https://www.verdebliss.com",
      "logo": "https://www.verdebliss.com/images/logo.webp",
      "description": "Certified organic skincare brand from India. Vegan, cruelty-free, dermatologist-tested formulations.",
      "foundingDate": "2019",
      "foundingLocation": "Pune, Maharashtra, India",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "hello@verdebliss.in",
        "contactType": "customer service",
        "availableLanguage": ["English", "Hindi"]
      },
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Kharadi",
        "addressLocality": "Pune",
        "addressRegion": "Maharashtra",
        "postalCode": "411014",
        "addressCountry": "IN"
      },
      "sameAs": [
        "https://www.instagram.com/verdebliss",
        "https://www.pinterest.com/verdebliss"
      ]
    }
    </script>

    <!-- JSON-LD: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "VerdeBliss",
      "url": "https://www.verdebliss.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.verdebliss.com/products?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
