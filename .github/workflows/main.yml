# ══════════════════════════════════════════════════════════════════════════════
#  VerdeBliss — CI / CD Pipeline
#  Trigger: push or PR to main
#
#  Jobs (run in parallel after checkout):
#   1. quality   — ESLint code-quality check
#   2. test      — Vitest unit + integration tests with V8 coverage
#   3. deploy-preview    — Vercel preview URL (PRs only, needs quality + test)
#   4. deploy-production — Vercel production (main push only, needs quality + test)
#
#  Required repository secrets:
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
#   VITE_ANTHROPIC_API_KEY, VITE_RAZORPAY_KEY_ID
#   CODECOV_TOKEN  (optional — upload test coverage to codecov.io)
# ══════════════════════════════════════════════════════════════════════════════

name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '24'
  VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

# ── Job 1: ESLint ─────────────────────────────────────────────────────────────
jobs:
  quality:
    name: Code Quality (ESLint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'                   # cache ~/.npm between runs

      - name: Install dependencies
        run: npm install --include=dev                      # ci is faster + reproducible vs install

      - name: Run ESLint
        run: npm run lint

# ── Job 2: Unit + Integration Tests ──────────────────────────────────────────
  test:
    name: Test Suite (Vitest)
    runs-on: ubuntu-latest
    needs: quality                       # only test if lint passes

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --include=dev

      # ── Step A: Run Vitest with V8 coverage ──────────────────────────────
      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          # Provide dummy env vars so Supabase client doesn't crash during tests.
          # Real Supabase calls are mocked in src/tests/setup.js.
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL      || 'http://localhost:54321' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'public-anon-key' }}

      # ── Step B: Upload HTML coverage report as a CI artifact ─────────────
      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        if: always()                     # upload even when tests fail
        with:
          name: coverage-report
          path: coverage/                # output of vitest --coverage
          retention-days: 14

      # ── Step C: Push coverage data to Codecov (optional)

# ── Job 3: Vercel Preview (PR only) ──────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview (Vercel)
    runs-on: ubuntu-latest
    needs: [quality, test]               # require both lint + tests to pass
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --include=dev

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build via Vercel CLI
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ANTHROPIC_API_KEY: ${{ secrets.VITE_ANTHROPIC_API_KEY }}
          VITE_RAZORPAY_KEY_ID:   ${{ secrets.VITE_RAZORPAY_KEY_ID }}

      - name: Deploy prebuilt output to Vercel (Preview)
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$URL" >> $GITHUB_OUTPUT

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🌿 **Preview deployed:** ${{ steps.deploy.outputs.preview_url }}`
            })

# ── Job 4: Vercel Production (main push only) ─────────────────────────────────
  deploy-production:
    name: Deploy Production (Vercel)
    runs-on: ubuntu-latest
    needs: [quality, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --include=dev

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build via Vercel CLI
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ANTHROPIC_API_KEY: ${{ secrets.VITE_ANTHROPIC_API_KEY }}
          VITE_RAZORPAY_KEY_ID:   ${{ secrets.VITE_RAZORPAY_KEY_ID }}

      - name: Deploy prebuilt output to Vercel (Production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}